name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nim: ['2.0.0', 'stable', 'devel']
      fail-fast: false
      max-parallel: 3

    name: Nim ${{ matrix.nim }}
    steps:
    - name: Setup Nim Enviroment
      uses: actions/checkout@v4

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v2
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update nimble
      run: nimble update

    - name: Run tests
      run: nimble test

    - name: Test doc examples
      run: nimble doc src/jaysonrpc.nim
